<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проект с использованием Vuex, Vue Router и Vuetify</title>

  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.css" rel="stylesheet">
</head>
<body>

  <div id="app">
    <v-app class="bg-grey-lighten-4">
      
      <v-app-bar color="primary" elevation="2">
        <v-app-bar-title class="font-weight-bold">
          <v-icon icon="mdi-database" class="mr-2"></v-icon>
          Vuex Store + Router + Vuetify
        </v-app-bar-title>
        <v-spacer></v-spacer>
        <v-btn to="/" prepend-icon="mdi-format-list-checks" class="mr-2">Список дел</v-btn>
        <v-btn to="/about" prepend-icon="mdi-information-outline">О программе</v-btn>
      </v-app-bar>

      <v-main class="mt-6">
        <v-container style="max-width: 650px;">
          
          <router-view></router-view>

        </v-container>
      </v-main>

    </v-app>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vuex@4.0.2/dist/vuex.global.js"></script>
  <script src="https://unpkg.com/vue-router@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.js"></script>

  <script>

    const store = Vuex.createStore({
      state() {
        return {
          todos: [
            { id: 1, text: 'Изучить концепцию Vuex (State, Mutations)', isDone: true },
            { id: 2, text: 'Вынести массив задач в глобальный Store', isDone: true },
            { id: 3, text: 'Сдать финальное задание по Vuex', isDone: false }
          ]
        }
      },
      getters: {
        allTodos(state) {
          return state.todos;
        },
        todosCount(state) {
          return state.todos.length;
        }
      },
      mutations: {
        ADD_TODO(state, todoText) {
          state.todos.push({
            id: Date.now(),
            text: todoText,
            isDone: false
          });
        },
        DELETE_TODO(state, idToRemove) {
          state.todos = state.todos.filter(todo => todo.id !== idToRemove);
        },
        TOGGLE_TODO(state, idToToggle) {
          const todo = state.todos.find(t => t.id === idToToggle);
          if (todo) {
            todo.isDone = !todo.isDone;
          }
        }
      }
    });

    
    const TodoPage = {
      template: `
        <v-card class="pa-6" elevation="3">
          <v-card-item class="text-center">
            <v-card-title class="text-h4 font-weight-bold text-primary mb-2">
              <v-icon icon="mdi-checkbox-marked-circle-outline" class="mr-2"></v-icon>
              Менеджер Задач (Vuex)
            </v-card-title>
          </v-card-item>

          <v-form @submit.prevent="submitForm" class="mb-6">
            <v-row no-gutters align="center">
              <v-col cols="9" class="pr-2">
                <v-text-field
                  v-model.trim="newTodo"
                  label="Новая задача"
                  variant="outlined"
                  color="primary"
                  hide-details
                  clearable
                ></v-text-field>
              </v-col>
              <v-col cols="3">
                <v-btn type="submit" color="primary" height="56" block prepend-icon="mdi-plus">
                  Добавить
                </v-btn>
              </v-col>
            </v-row>
          </v-form>

          <v-divider class="mb-4"></v-divider>

          <v-list v-if="todosList.length > 0" class="bg-transparent">
            <v-list-item v-for="todo in todosList" :key="todo.id" class="mb-2 border rounded bg-white" elevation="1">
              
              <template v-slot:prepend>
                <v-checkbox-btn 
                  :model-value="todo.isDone" 
                  @change="toggleTodoState(todo.id)"
                  color="success"
                ></v-checkbox-btn>
              </template>

              <v-list-item-title 
                :class="{ 'text-decoration-line-through text-grey': todo.isDone }"
                style="cursor: pointer; font-size: 16px;"
                @click="toggleTodoState(todo.id)"
              >
                {{ todo.text }}
              </v-list-item-title>

              <template v-slot:append>
                <v-btn icon="mdi-delete" variant="text" color="error" @click="deleteTodoItem(todo.id)"></v-btn>
              </template>
            </v-list-item>
          </v-list>

          <v-alert v-else type="success" variant="tonal" text="Все дела сделаны!" icon="mdi-emoticon-happy-outline" class="text-center"></v-alert>
          
          <v-chip class="mt-4" color="secondary" variant="outlined">
            Всего задач в хранилище: {{ totalCount }}
          </v-chip>
        </v-card>
      `,
      data() {
        return {
          newTodo: ''
        }
      },
      computed: {
        todosList() {
          return this.$store.getters.allTodos;
        },
        totalCount() {
          return this.$store.getters.todosCount;
        }
      },
      methods: {
        submitForm() {
          if (this.newTodo === '') return;
          this.$store.commit('ADD_TODO', this.newTodo);
          this.newTodo = '';
        },
        deleteTodoItem(id) {
          this.$store.commit('DELETE_TODO', id);
        },
        toggleTodoState(id) {
          this.$store.commit('TOGGLE_TODO', id);
        }
      }
    };

    const AboutPage = {
      template: `
        <v-card class="pa-6 text-center" elevation="3">
          <v-avatar color="primary" size="80" class="mb-4">
            <v-icon icon="mdi-server" size="40" color="white"></v-icon>
          </v-avatar>
          
          <v-card-title class="text-h5 font-weight-bold mb-2">Глобальное хранилище Vuex 4</v-card-title>
          
          <v-card-text class="text-body-1 text-grey-darken-1">
            В этой итерации проекта все данные перенесены в централизованный <strong>Vuex Store</strong>. 
            <br><br>
            Даже если вы перейдете на эту вкладку, а потом вернетесь назад, состояние списка полностью сохранится, так как данные больше не привязаны к жизненному циклу конкретной страницы!
          </v-card-text>

          <v-divider class="my-4"></v-divider>

          <v-card-actions class="justify-center">
            <v-btn color="primary" variant="flat" to="/" prepend-icon="mdi-arrow-left">
              К списку задач
            </v-btn>
          </v-card-actions>
        </v-card>
      `
    };

    const routes = [
      { path: '/', component: TodoPage },
      { path: '/about', component: AboutPage }
    ];

    const router = VueRouter.createRouter({
      history: VueRouter.createWebHashHistory(),
      routes
    });

    const { createVuetify } = Vuetify;
    const vuetify = createVuetify();

    const app = Vue.createApp({});
    
    app.use(store);
    app.use(router);
    app.use(vuetify);
    app.mount('#app');
  </script>

</body>
</html>
