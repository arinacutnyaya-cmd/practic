<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проект с использованием Vue Router 4 и Vuetify</title>

  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.css" rel="stylesheet">
</head>
<body>

  <div id="app">
    <v-app class="bg-grey-lighten-4">
      
      <v-app-bar color="primary" elevation="2">
        <v-app-bar-title class="font-weight-bold">
          <v-icon icon="mdi-vuejs" class="mr-2"></v-icon>
          Vue Router 4 + Vuetify
        </v-app-bar-title>
        
        <v-spacer></v-spacer>

        <v-btn to="/" prepend-icon="mdi-format-list-checks" class="mr-2">
          Список дел
        </v-btn>
        <v-btn to="/about" prepend-icon="mdi-information-outline">
          О программе
        </v-btn>
      </v-app-bar>

      <v-main class="mt-6">
        <v-container style="max-width: 650px;">
          
          <router-view></router-view>

        </v-container>
      </v-main>

    </v-app>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.js"></script>

  <script>
    // 1. Определение компонента: Главная страница (Список дел)
    const TodoPage = {
      template: `
        <v-card class="pa-6" elevation="3">
          <v-card-item class="text-center">
            <v-card-title class="text-h4 font-weight-bold text-primary mb-2">
              <v-icon icon="mdi-checkbox-marked-circle-outline" class="mr-2"></v-icon>
              Мои задачи
            </v-card-title>
          </v-card-item>

          <v-form @submit.prevent="addTodo" class="mb-6">
            <v-row no-gutters align="center">
              <v-col cols="9" class="pr-2">
                <v-text-field
                  v-model.trim="newTodo"
                  label="Что нужно сделать?"
                  variant="outlined"
                  color="primary"
                  hide-details
                  clearable
                ></v-text-field>
              </v-col>
              <v-col cols="3">
                <v-btn type="submit" color="primary" height="56" block prepend-icon="mdi-plus">
                  Добавить
                </v-btn>
              </v-col>
            </v-row>
          </v-form>

          <v-divider class="mb-4"></v-divider>

          <v-list v-if="todos.length > 0" class="bg-transparent">
            <v-list-item v-for="todo in todos" :key="todo.id" class="mb-2 border rounded bg-white" elevation="1">
              <template v-slot:prepend>
                <v-checkbox-btn v-model="todo.isDone" color="success"></v-checkbox-btn>
              </template>

              <v-list-item-title 
                :class="{ 'text-decoration-line-through text-grey': todo.isDone }"
                style="cursor: pointer; font-size: 16px;"
                @click="todo.isDone = !todo.isDone"
              >
                {{ todo.text }}
              </v-list-item-title>

              <template v-slot:append>
                <v-btn icon="mdi-delete" variant="text" color="error" @click="deleteTodo(todo.id)"></v-btn>
              </template>
            </v-list-item>
          </v-list>

          <v-alert v-else type="success" variant="tonal" text="Все задачи выполнены! Нажмите 'О программе', чтобы узнать больше." icon="mdi-emoticon-happy-outline" class="text-center"></v-alert>
        </v-card>
      `,
      data() {
        return {
          newTodo: '',
          todos: [
            { id: 1, text: 'Изучить основы Vue Router 4', isDone: true },
            { id: 2, text: 'Настроить переключение страниц без перезагрузки', isDone: true },
            { id: 3, text: 'Успешно сдать практическое задание', isDone: false }
          ]
        }
      },
      methods: {
        addTodo() {
          if (this.newTodo === '') return;
          this.todos.push({ id: Date.now(), text: this.newTodo, isDone: false });
          this.newTodo = '';
        },
        deleteTodo(idToRemove) {
          this.todos = this.todos.filter(todo => todo.id !== idToRemove);
        }
      }
    };

    // 2. Определение компонента: Страница "О программе"
    const AboutPage = {
      template: `
        <v-card class="pa-6 text-center" elevation="3">
          <v-avatar color="primary" size="80" class="mb-4">
            <v-icon icon="mdi-information-variant" size="40" color="white"></v-icon>
          </v-avatar>
          
          <v-card-title class="text-h5 font-weight-bold mb-2">О данном проекте</v-card-title>
          
          <v-card-text class="text-body-1 text-grey-darken-1">
            Это демонстрационное SPA-приложение, созданное в рамках изучения курса по 
            <strong>Vue Router 4</strong> и библиотеке компонентов <strong>Vuetify 3</strong>.
            <br><br>
            Маршрутизация позволяет мгновенно переключаться между вкладками «Список дел» и «О программе» без отправки запросов на сервер и перезагрузки страницы в браузере.
          </v-card-text>

          <v-divider class="my-4"></v-divider>

          <v-card-actions class="justify-center">
            <v-btn color="primary" variant="flat" to="/" prepend-icon="mdi-arrow-left">
              Вернуться к списку
            </v-btn>
          </v-card-actions>
        </v-card>
      `
    };

    // 3. Настройка маршрутов (Routes)
    const routes = [
      { path: '/', component: TodoPage },       // Главная страница ведет на компонент списка дел
      { path: '/about', component: AboutPage }   // Путь /about ведет на страницу инфо
    ];

    // 4. Создание экземпляра маршрутизатора Vue Router
    const router = VueRouter.createRouter({
      history: VueRouter.createWebHashHistory(), // Используем Hash-режим маршрутизации для корректной работы через файлы
      routes
    });

    // 5. Инициализация Vuetify
    const { createVuetify } = Vuetify;
    const vuetify = createVuetify();

    // 6. Создание и запуск Vue-приложения
    const app = Vue.createApp({});
    
    app.use(router);  // Подключаем маршрутизатор
    app.use(vuetify); // Подключаем Vuetify
    app.mount('#app');
  </script>

</body>
</html>
