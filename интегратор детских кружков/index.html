<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кружки38 — Каталог секций</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">Кружки<span>38</span></div>
    <nav class="menu">
      <a href="index.html" class="active">Каталог</a>
      <a href="recommendations.html">Подбор</a>
      <a href="cabinet.html">Кабинет <span id="badge" class="badge">0</span></a>
      <a href="about.html">О сервисе</a>
    </nav>
  </header>

  <main class="main-container">
    <div class="grid-layout">
      
      <aside class="sidebar">
        <div class="card">
          <h3 class="card-title"><i class="mdi mdi-tune-variant"></i> Параметры поиска</h3>
          <hr class="divider">
          
          <div class="form-group">
            <label for="search-text">Поиск по названию</label>
            <input type="text" id="search-text" placeholder="Введите название...">
          </div>
          
          <div class="form-group">
            <label for="search-category">Направление</label>
            <select id="search-category">
              <option value="Все">Все направления</option>
              <option value="Спорт">Спорт</option>
              <option value="Наука и IT">Наука и IT</option>
              <option value="Искусство">Искусство</option>
              <option value="Языки">Языки</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="search-age">Возраст ребенка: <span id="age-val">10</span> лет</label>
            <input type="range" id="search-age" min="5" max="18" value="10">
          </div>
        </div>

        <div class="card mt-20">
          <h3 class="card-title"><i class="mdi mdi-map-marker-radius"></i> Кружки на карте</h3>
          <div id="map"></div>
        </div>
      </aside>

      <section class="content">
        <div class="content-header">
          <h2>Доступные программы обучения</h2>
          <span class="counter" id="club-count">Всего: 5</span>
        </div>
        
        <div class="clubs-grid" id="clubs-container">
          </div>
      </section>

    </div>
  </main>

  <div class="modal-overlay" id="modal-order">
    <div class="modal">
      <h3 class="modal-title">Электронная запись</h3>
      <p class="modal-subtitle">Вы подаете заявку в: <b id="modal-club-name">Название</b></p>
      
      <div class="form-group">
        <label>ФИО Заявителя (родителя)</label>
        <input type="text" id="form-parent" placeholder="Иванов Иван Иванович">
      </div>
      <div class="form-group">
        <label>Имя и фамилия ребенка</label>
        <input type="text" id="form-child" placeholder="Иванов Алексей">
      </div>
      <div class="form-group">
        <label>Возраст ребенка</label>
        <input type="number" id="form-age" placeholder="10">
      </div>
      
      <div class="modal-actions">
        <button class="btn btn-text" onclick="closeModal()">Отмена</button>
        <button class="btn btn-flat" onclick="submitBooking()">Подтвердить запись</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const defaultClubs = [
      { id: 1, title: "Секция робототехники 'Lego-Master'", category: "Наука и IT", ageMin: 6, ageMax: 12, address: "ул. Ленина, д. 14", schedule: "Пн, Ср с 15:00", price: 3200, coords: [52.283, 104.285], rating: 4.8, phone: "+7 (3952) 55-01-01", reviews: "Ребенок в восторге, сам собирает роботов!" },
      { id: 2, title: "Школа спортивного плавания 'Дельфин'", category: "Спорт", ageMin: 5, ageMax: 16, address: "ул. Сергеева, д. 3/1", schedule: "Вт, Чт, Сб с 16:30", price: 4500, coords: [52.256, 104.238], rating: 5.0, phone: "+7 (3952) 66-12-34", reviews: "Профессиональный тренерский состав!" },
      { id: 3, title: "Студия современной живописи 'Арт-Мир'", category: "Искусство", ageMin: 7, ageMax: 15, address: "ул. Карла Маркса, д. 25", schedule: "Ср, Пт с 17:00", price: 2800, coords: [52.289, 104.292], rating: 4.5, phone: "+7 (3952) 77-88-99", reviews: "Научили рисовать маслом за месяц." },
      { id: 4, title: "Академия веб-разработки JavaScript", category: "Наука и IT", ageMin: 12, ageMax: 18, address: "ул. Лермонтова, д. 83", schedule: "Сб, Вс с 11:00", price: 5000, coords: [52.262, 104.251], rating: 4.9, phone: "+7 (3952) 99-00-11", reviews: "Изучают реальный JS и фреймворки." },
      { id: 5, title: "Клуб углубленного английского 'Lexicon'", category: "Языки", ageMin: 8, ageMax: 17, address: "ул. Байкальская, д. 108", schedule: "Вт, Чт с 14:00", price: 3800, coords: [52.271, 104.315], rating: 4.7, phone: "+7 (3952) 22-33-44", reviews: "Разговорные клубы с носителями языка." }
    ];
    if (!localStorage.getItem('clubs')) localStorage.setItem('clubs', JSON.stringify(defaultClubs));
    if (!localStorage.getItem('bookings')) localStorage.setItem('bookings', JSON.stringify([]));
    if (!localStorage.getItem('notifications')) {
      localStorage.setItem('notifications', JSON.stringify([
        { id: 1, text: "Добро пожаловать в личный кабинет Кружки38! Заполните профиль.", unread: true },
        { id: 2, text: "Обновлена интерактивная база секций г. Иркутска. Добавлено 3 новых направления.", unread: true }
      ]));
    }

    let currentClubForBooking = null;
    let map, markers = [];

    const searchTxt = document.getElementById('search-text');
    const searchCat = document.getElementById('search-category');
    const searchAge = document.getElementById('search-age');
    const ageVal = document.getElementById('age-val');
    const container = document.getElementById('clubs-container');
    const countLabel = document.getElementById('club-count');

    function updateBadge() {
      const notes = JSON.parse(localStorage.getItem('notifications') || '[]');
      const unread = notes.filter(n => n.unread).length;
      const b = document.getElementById('badge');
      b.innerText = unread;
      b.style.display = unread > 0 ? 'inline-block' : 'none';
    }

    function initMap() {
      map = L.map('map').setView([52.2855, 104.2890], 11);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);
    }

    function render() {
      const clubs = JSON.parse(localStorage.getItem('clubs'));
      const text = searchTxt.value.toLowerCase();
      const cat = searchCat.value;
      const age = parseInt(searchAge.value);
      ageVal.innerText = age;

      markers.forEach(m => map.removeLayer(m));
      markers = [];
      container.innerHTML = '';

      const filtered = clubs.filter(club => {
        const mText = club.title.toLowerCase().includes(text);
        const mCat = (cat === 'Все' || club.category === cat);
        const mAge = (age >= club.ageMin && age <= club.ageMax);
        return mText && mCat && mAge;
      });

      countLabel.innerText = `Найдено: ${filtered.length}`;

      if(filtered.length === 0) {
        container.innerHTML = `<div class="alert">По вашему запросу кружков не найдено. Измените параметры фильтрации.</div>`;
        return;
      }

      filtered.forEach(club => {
        const card = document.createElement('div');
        card.className = 'club-card';
        card.innerHTML = `
          <div class="card-meta">
            <span class="chip">${club.category}</span>
            <span class="rating"><i class="mdi mdi-star"></i> ${club.rating}</span>
          </div>
          <h4 class="club-title">${club.title}</h4>
          <p class="club-info"><i class="mdi mdi-face-man-shimmer"></i> Возраст: ${club.ageMin}-${club.ageMax} лет</p>
          <p class="club-info"><i class="mdi mdi-map-marker-outline"></i> ${club.address}</p>
          <p class="club-info"><i class="mdi mdi-calendar-clock"></i> ${club.schedule}</p>
          <div class="club-price">${club.price} ₽ <span>/ месяц</span></div>
          <hr class="divider">
          <div class="card-actions">
            <button class="btn btn-text" onclick="alert('Контакты: ${club.phone}\\nОтзыв: ${club.reviews}')">Подробнее</button>
            <button class="btn btn-flat" onclick="openModal(${club.id})">Записаться</button>
          </div>
        `;
        container.appendChild(card);

        const m = L.marker(club.coords).addTo(map).bindPopup(`<b>${club.title}</b><br>${club.address}`);
        markers.push(m);
      });
    }

    function openModal(id) {
      const clubs = JSON.parse(localStorage.getItem('clubs'));
      currentClubForBooking = clubs.find(c => c.id === id);
      document.getElementById('modal-club-name').innerText = currentClubForBooking.title;
      document.getElementById('modal-order').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal-order').classList.remove('active');
    }

    function submitBooking() {
      const parent = document.getElementById('form-parent').value;
      const child = document.getElementById('form-child').value;
      const age = document.getElementById('form-age').value;

      if(!parent || !child || !age) {
        alert('Заполните все поля формы!');
        return;
      }

      const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
      bookings.push({
        id: Date.now(),
        clubTitle: currentClubForBooking.title,
        parentName: parent,
        childName: child,
        date: new Date().toLocaleDateString()
      });
      localStorage.setItem('bookings', JSON.stringify(bookings));

      const notes = JSON.parse(localStorage.getItem('notifications') || '[]');
      notes.unshift({
        id: Date.now(),
        text: `Ваша заявка на запись ребенка (${child}) в секцию "${currentClubForBooking.title}" успешно принята.`,
        unread: true
      });
      localStorage.setItem('notifications', JSON.stringify(notes));

      alert('Вы успешно записались! Проверить статус можно в личном кабинете.');
      closeModal();
      updateBadge();
      
      document.getElementById('form-parent').value = '';
      document.getElementById('form-child').value = '';
      document.getElementById('form-age').value = '';
    }

    searchTxt.addEventListener('input', render);
    searchCat.addEventListener('change', render);
    searchAge.addEventListener('input', render);

    window.onload = () => {
      initMap();
      render();
      updateBadge();
    };
  </script>
</body>
</html>
